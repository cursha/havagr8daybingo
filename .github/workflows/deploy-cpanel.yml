name: Build & deploy frontend to cPanel (FTP)

# Builds frontend/ in CI and FTP-uploads the result to /havagr8day.com.
#
# Why this exists: the site kept white-screening because builds were made
# without the public client config (Stripe publishable key, Supabase anon
# key) that lives in frontend/.env.production. That file is COMMITTED (it
# holds only PUBLIC values that already ship in the browser bundle), so every
# build here is correct. The real secrets (Stripe sk_live, Supabase
# service_role) are NOT here and stay server-side.
#
# Safety: if the Stripe key is missing from .env.production OR absent from the
# built bundle, the job FAILS before uploading, so a keyless build can never
# reach production (the previous good build just stays up). A failing build
# never deploys. Upload-only: never deletes remote files (game_prize_images/,
# .htaccess untouched). Runs from GitHub's IPs to dodge the host FTP rate limit.

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-cpanel.yml'

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Guard — refuse to build without the Supabase client config
        working-directory: frontend
        run: |
          # These public client values must be present at build time or the app
          # has nothing to connect to (login + all data calls would fail).
          # Payments use Stripe hosted checkout, so no publishable key is needed
          # in the bundle anymore.
          if ! grep -q "VITE_SUPABASE_ANON_KEY=ey" .env.production; then
            echo "::error::.env.production is missing VITE_SUPABASE_ANON_KEY. Refusing to build a broken bundle."
            exit 1
          fi
          if ! grep -q "VITE_API_BASE_URL=http" .env.production; then
            echo "::error::.env.production is missing VITE_API_BASE_URL. Refusing to build a broken bundle."
            exit 1
          fi

      - name: Build (vite directly to bypass pnpm deps-status gate)
        working-directory: frontend
        run: node ./node_modules/vite/bin/vite.js build

      - name: Verify the Supabase config is baked into the bundle
        working-directory: frontend
        run: |
          if ! grep -rq "cjvnxvzuummcgzmjkffk.supabase.co" dist/assets/; then
            echo "::error::Built bundle has no Supabase URL. Refusing to deploy a broken build."
            exit 1
          fi
          echo "Supabase config confirmed present in built bundle."

      - name: Gentle FTP upload of frontend/dist
        env:
          U: ${{ secrets.CPANEL_USER }}
          P: ${{ secrets.CPANEL_PASS }}
          H: ${{ secrets.CPANEL_HOST }}
        run: |
          ROOT=/havagr8day.com
          up() {
            local f="$1"; local dir="$2"
            for i in $(seq 1 8); do
              if curl --ftp-pasv --ftp-create-dirs --connect-timeout 20 --max-time 120 -s -S -T "$f" "ftp://$U:$P@$H$dir/"; then
                echo "  OK: $dir/$(basename "$f")"; return 0
              fi
              echo "  retry $i: $(basename "$f")"; sleep 4
            done
            echo "  FAILED: $(basename "$f")"; return 1
          }
          FAILS=0
          echo "== assets first (so index.html never points at a missing bundle) =="
          for f in frontend/dist/assets/*; do
            up "$f" "$ROOT/assets" || FAILS=$((FAILS+1)); sleep 3
          done
          echo "== root files (index.html, robots, sitemap, favicon, dare-*.png / badge-*.png) =="
          for f in frontend/dist/*; do
            [ -f "$f" ] && { up "$f" "$ROOT" || FAILS=$((FAILS+1)); sleep 3; }
          done
          echo "== blog =="
          [ -f frontend/dist/blog/index.html ] && { up frontend/dist/blog/index.html "$ROOT/blog" || FAILS=$((FAILS+1)); }
          echo "TOTAL FAILED: $FAILS"
          [ "$FAILS" -eq 0 ]
