name: Deploy frontend to cPanel (FTP, upload-only)

# Uploads frontend/dist to /havagr8day.com over FTP from a GitHub runner.
# Upload-only: it never deletes remote files, so game_prize_images/ and
# .htaccess are left untouched. Runs from GitHub's IPs, which avoids the
# host's per-IP FTP rate limit that blocks rapid local deploys.

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths: [ 'frontend/dist/**' ]

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gentle FTP upload of frontend/dist
        env:
          U: ${{ secrets.CPANEL_USER }}
          P: ${{ secrets.CPANEL_PASS }}
          H: ${{ secrets.CPANEL_HOST }}
        run: |
          ROOT=/havagr8day.com
          up() {
            local f="$1"; local dir="$2"
            for i in $(seq 1 8); do
              if curl --ftp-pasv --ftp-create-dirs --connect-timeout 20 --max-time 120 -s -S -T "$f" "ftp://$U:$P@$H$dir/"; then
                echo "  OK: $dir/$(basename "$f")"; return 0
              fi
              echo "  retry $i: $(basename "$f")"; sleep 4
            done
            echo "  FAILED: $(basename "$f")"; return 1
          }
          FAILS=0
          echo "== root files (index.html, robots, sitemap, favicon, AND dare-*.png / badge-*.png) =="
          for f in frontend/dist/*; do
            [ -f "$f" ] && { up "$f" "$ROOT" || FAILS=$((FAILS+1)); sleep 3; }
          done
          echo "== assets =="
          for f in frontend/dist/assets/*; do
            up "$f" "$ROOT/assets" || FAILS=$((FAILS+1)); sleep 3
          done
          echo "== blog =="
          [ -f frontend/dist/blog/index.html ] && { up frontend/dist/blog/index.html "$ROOT/blog" || FAILS=$((FAILS+1)); }
          echo "TOTAL FAILED: $FAILS"
          [ "$FAILS" -eq 0 ]
